version: "3"

services:
  devopsdb:
    image: shaikmustafa/automation:db
    ports:
      - "3306:3306"
    networks:
      - mynetwork

  application:
    image: shaikmustafa/automation:app
    ports:
      - "1111:8080"
    networks:
      - mynetwork
    depends_on:
      - devopsdb

networks:
  mynetwork:
    driver: bridge
